[package]
name = "lickbot2"
version = "0.1.0"
edition = "2024"

[dependencies]
azalea = { git = "https://github.com/azalea-rs/azalea", version = "0.16.0" }
parking_lot = { version = "0.12.5", features = ["deadlock_detection"] }
tokio = "1.51.0"

[profile.dev]
opt-level = 1
[profile.dev.package."*"]
opt-level = 3
